name: Deploy Hugo Site

on:
  push:
    branches:
      - main

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetch PaperMod theme
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: hugo --minify

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install Infrastructure Dependencies
        run: npm ci
        working-directory: infra

      - name: Build Infrastructure
        run: npm run build
        working-directory: infra

      - name: Deploy Infrastructure
        run: npx cdk deploy --require-approval never
        working-directory: infra
        env:
          CERTIFICATE_ARN: ${{ secrets.CERTIFICATE_ARN }}
          SITE_BUCKET: ${{ secrets.SITE_BUCKET }}

      - name: Sync S3 Content
        run: |
          aws s3 sync public/ s3://${{ secrets.SITE_BUCKET }} --delete

      - name: Invalidate CloudFront Cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks --stack-name HugoSiteStack --query "Stacks[0].Outputs[?OutputKey=='SiteDistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
